{% comment %} # inventory/templates/inventory/inventory_board.html {% endcomment %}
<!DOCTYPE html>
<html>
<head>

<title>Inventory</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

.card{
border-radius:14px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.low{
color:red;
font-weight:600;
}

</style>

</head>

<body>

<div class="container mt-4">

<h3 class="mb-4">Inventory Board</h3>

<div class="card p-4">

<table class="table">

<thead>

<tr>
<th>Ingredient</th>
<th>Stock</th>
<th>Unit</th>
<th>Status</th>
</tr>

</thead>

<tbody>

{% for item in items %}

<tr>

<td>{{item.name}}</td>

<td>{{item.stock}}</td>

<td>{{item.unit}}</td>

<td>

{% if item.is_low_stock %}
<span class="low">Low Stock</span>
{% else %}
OK
{% endif %}

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
