<!DOCTYPE html>
<html>
<head>

<title>Kitchen Display</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#111827;
color:white;
font-family:system-ui;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px;
background:#0f172a;
border-bottom:2px solid #1f2937;
}

.orders-grid{
padding:20px;
}

/* order cards */

.order-card{
background:#1f2937;
border-radius:16px;
padding:18px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
height:100%;
display:flex;
flex-direction:column;
}

.green{border-left:8px solid #22c55e}
.orange{border-left:8px solid #f59e0b}
.red{border-left:8px solid #ef4444}

.order-header{
display:flex;
justify-content:space-between;
margin-bottom:12px;
}

.table-name{
font-size:22px;
font-weight:700;
}

.timer{
font-size:18px;
font-weight:600;
}

.items{
flex-grow:1;
overflow-y:auto;
max-height:220px;
}

/* item rows */

.item{
padding:8px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
display:flex;
justify-content:space-between;
align-items:center;
font-size:16px;
}

.empty{
text-align:center;
padding:80px;
opacity:.7;
font-size:20px;
}

.loading{
text-align:center;
padding:60px;
opacity:.6;
}

</style>

</head>

<body>

<div class="header">

<h3>Kitchen Display</h3>

<a href="/tables/" class="btn btn-light btn-sm">Tables</a>

</div>

<div class="container-fluid orders-grid">

<div class="row" id="orders-container">

<div class="loading">Loading kitchen orders...</div>

</div>

</div>

<script>

let loading=false

function getCookie(name){

let cookieValue=null

if(document.cookie){

let cookies=document.cookie.split(";")

for(let i=0;i<cookies.length;i++){

let cookie=cookies[i].trim()

if(cookie.substring(0,name.length+1)===(name+"=")){
cookieValue=decodeURIComponent(cookie.substring(name.length+1))
}

}

}

return cookieValue

}

function getColor(minutes){

if(minutes < 5) return "green"
if(minutes < 10) return "orange"

return "red"

}

function refreshOrders(){

if(loading) return

loading=true

fetch("/kitchen-data/")

.then(res=>res.json())

.then(data=>{

let container=document.getElementById("orders-container")

container.innerHTML=""

if(!data.kots || data.kots.length===0){

container.innerHTML=`<div class="empty">No active kitchen orders</div>`

loading=false
return
}

data.kots.forEach(order=>{

let created=new Date(order.created_at)

let minutes=0

if(!isNaN(created)){
minutes=Math.floor((Date.now()-created)/60000)
}

let color=getColor(minutes)

let itemsHTML=""

order.items.forEach(i=>{

let action=""

if(i.status==="sent"){

action=`<button class="btn btn-warning btn-sm"
onclick="startPreparing(${i.id})">
Start Preparing
</button>`

}

else if(i.status==="preparing"){

action=`<button class="btn btn-success btn-sm"
onclick="markReady(${i.id})">
Mark Ready
</button>`

}

else if(i.status==="ready"){

action=`<span class="badge bg-success">Ready</span>`

}

itemsHTML+=`

<div class="item">

<div>${i.quantity} × ${i.name}</div>

<div>${action}</div>

</div>

`

})

container.innerHTML+=`

<div class="col-lg-3 col-md-4 col-sm-6">

<div class="order-card ${color}">

<div class="order-header">

<div class="table-name">
${order.table}
</div>

<div class="timer">
${minutes} min
</div>

</div>

<div class="items">

${itemsHTML}

</div>

</div>

</div>

`

})

loading=false

})

.catch(()=>{

loading=false

})

}

function startPreparing(itemId){

fetch(`/item-start/${itemId}/`,{

method:"POST",

headers:{
"X-CSRFToken":getCookie("csrftoken")
}

})
.then(()=>refreshOrders())

}

function markReady(itemId){

fetch(`/item-ready/${itemId}/`,{

method:"POST",

headers:{
"X-CSRFToken":getCookie("csrftoken")
}

})
.then(()=>refreshOrders())

}

refreshOrders()

setInterval(refreshOrders,3000)

</script>

</body>
</html>
