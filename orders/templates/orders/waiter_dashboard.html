{% comment %} # orders/templates/orders/waiter_dashboard.html {% endcomment %}
<!DOCTYPE html>
<html>
<head>

<title>Waiter Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f2f4f7;
font-family:Arial;
}

.call-card{
background:white;
border-radius:12px;
padding:20px;
margin-bottom:20px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.table-name{
font-size:22px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="container mt-4">

<div class="d-flex justify-content-between mb-3">

<h2>Waiter Calls</h2>

<div>

<a href="/tables/" class="btn btn-dark me-2">Tables</a>
<a href="/billing/" class="btn btn-success">Billing</a>

</div>

</div>

{% if calls %}

<div class="row">

{% for call in calls %}

<div class="col-md-4">

<div class="call-card">

<div class="table-name">
Table {{ call.table.name }}
</div>

<p>
Requested at: {{ call.created_at }}
</p>

<button class="btn btn-success"
onclick="resolveCall({{ call.id }})">

Mark Resolved

</button>

</div>

</div>

{% endfor %}

</div>

{% else %}

<div class="alert alert-info">

No waiter calls.

</div>

{% endif %}

</div>

<script>

function resolveCall(callId){

fetch(`/resolve-waiter/${callId}/`,{

method:"POST",

headers:{
"X-CSRFToken":getCookie("csrftoken")
}

})
.then(res=>res.json())
.then(data=>{

if(data.success){

location.reload()

}

})

}


function getCookie(name){

let cookieValue = null

if(document.cookie && document.cookie !== ""){

let cookies = document.cookie.split(";")

for(let i=0;i<cookies.length;i++){

let cookie = cookies[i].trim()

if(cookie.substring(0,name.length+1)===(name+"=")){

cookieValue = decodeURIComponent(cookie.substring(name.length+1))
break

}

}

}

return cookieValue

}

setInterval(function(){

location.reload()

},5000)

</script>

</body>
</html>
