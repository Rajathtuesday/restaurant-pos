<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Waiter Calls | Fine Dining</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            /* Fine Dining Monochrome Palette */
            --bg-color: #fafafa;
            --panel-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #737373;
            --border-color: #eaeaea;
            --accent-gold: #c5a059;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body.dark {
            --bg-color: #0a0a0a;
            --panel-bg: #111111;
            --text-main: #f5f5f5;
            --text-muted: #888888;
            --border-color: #262626;
            --accent-gold: #d4af37;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: var(--transition-smooth);
            min-height: 100vh;
        }

        h1, h2, h3, h4, h5, h6, .serif-text {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        /* HEADER */
        .pos-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-color);
            flex-wrap: wrap; 
            gap: 1rem;
        }
        .brand-title {
            font-size: 1.5rem; margin: 0; color: var(--text-main);
        }

        /* NAV BUTTONS */
        .btn-luxury {
            border: 1px solid var(--border-color);
            background: transparent; color: var(--text-main);
            border-radius: 0; text-transform: uppercase;
            font-size: 0.75rem; letter-spacing: 1px; font-weight: 500;
            padding: 0.6rem 1rem; display: inline-flex; align-items: center;
            transition: var(--transition-smooth); white-space: nowrap; cursor: pointer;
            text-decoration: none;
        }
        .btn-luxury:hover { background: var(--text-main); color: var(--bg-color); border-color: var(--text-main); }
        .btn-icon {
            border: none; background: transparent; color: var(--text-main);
            font-size: 1.25rem; padding: 0.5rem; cursor: pointer;
        }

        /* CALL CARDS */
        .call-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 2rem;
            text-align: center;
            transition: var(--transition-smooth);
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-top: 4px solid #ef4444; /* Red urgency border */
            animation: pulse-shadow 2s infinite;
        }

        @keyframes pulse-shadow {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.1); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .call-card:hover { transform: translateY(-3px); }

        .table-name {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--text-main);
            margin: 0.5rem 0;
            line-height: 1;
        }

        .call-time {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2rem;
        }

        .btn-resolve {
            border: 1px dashed var(--c-free, #10b981);
            background: transparent;
            color: var(--text-main);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            font-weight: 600;
            padding: 0.8rem;
            border-radius: 4px;
            transition: var(--transition-smooth);
            width: 100%;
        }
        .btn-resolve:hover {
            background: var(--c-free, #10b981);
            color: #fff;
            border-style: solid;
        }

        .empty-state {
            text-align: center;
            padding: 5rem 1rem;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }

        @media (max-width: 576px) {
            .pos-header { padding: 1rem; justify-content: space-between; }
            .btn-luxury { padding: 0.5rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

<!-- HEADER -->
<header class="pos-header">
    <h1 class="brand-title"><i class="bi bi-bell me-2"></i> Waiter Calls</h1>
    <div class="d-flex align-items-center gap-2">
        <a href="/tables/" class="btn-luxury d-none d-sm-inline-flex">Floor Plan</a>
        <a href="/billing/" class="btn-luxury d-none d-sm-inline-flex">Billing</a>
        <a href="/kitchen/" class="btn-luxury d-none d-sm-inline-flex">Kitchen</a>
        
        <!-- Mobile Links -->
        <a href="/tables/" class="btn-icon d-sm-none"><i class="bi bi-grid-3x3"></i></a>
        <a href="/billing/" class="btn-icon d-sm-none"><i class="bi bi-receipt"></i></a>
        <a href="/kitchen/" class="btn-icon d-sm-none"><i class="bi bi-fire"></i></a>

        <button class="btn-icon ms-1" onclick="toggleDark()" title="Toggle Theme">
            <i class="bi bi-moon" id="themeIcon"></i>
        </button>
    </div>
</header>

<div class="container-fluid mx-auto py-5" style="max-width: 1400px; padding: 0 2rem;">

    <!-- 
        NOTIFICATIONS GRID
        Django filters the WaiterCall models and passes them down as 'calls'. 
        If there are any unresolved ones, it loops over them and displays a pulse-card!
    -->
    {% if calls %}
    <div class="row g-4">
        {% for call in calls %}
        <div class="col-12 col-md-4 col-xl-3">
            <div class="call-card">
                <div>
                    <div class="text-uppercase text-danger fw-bold" style="font-size:0.7rem; letter-spacing:2px;">Service Request</div>
                    <div class="table-name">Table {{ call.table.name }}</div>
                    <div class="call-time"><i class="bi bi-clock me-1"></i> {{ call.created_at|time:"H:i" }}</div>
                </div>
                
                <button class="btn-resolve" onclick="resolveCall({{ call.id }})">
                    <i class="bi bi-check2-circle fs-5 d-block mb-1"></i> Mark Resolved
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="empty-state">
        <i class="bi bi-cup-hot"></i>
        <h3 class="serif-text">Everything is Calm</h3>
        <p class="text-uppercase" style="letter-spacing:2px; font-size:0.8rem;">No active waiter calls right now.</p>
    </div>
    {% endif %}

</div>

<script>
    /**
     * DOM SETUP AND THEME
     * Checks if the user previously turned on 'dark mode' by reading localStorage.
     * If so, it appends the 'dark' class to the body element.
     */
    let isDark = localStorage.getItem("dark") === "true";

    function updateIcons() {
        let icon = document.getElementById("themeIcon");
        if(isDark) { 
            document.body.classList.add("dark"); 
            icon.classList.replace("bi-moon", "bi-sun"); 
        } else { 
            document.body.classList.remove("dark"); 
            icon.classList.replace("bi-sun", "bi-moon"); 
        }
    }
    updateIcons();

    /* Toggles turning dark mode on or off when you click the moon/sun icon */
    function toggleDark() { isDark = !isDark; localStorage.setItem("dark", isDark); updateIcons(); }

    /**
     * API INTEGRATION: Resolve Call
     * This function is triggered when the green "Mark Resolved" button is clicked.
     * It sends an invisible POST request strictly to /resolve-waiter/<ID>/ to tell Django
     * that the server has attended the table.
     */
    function resolveCall(callId){
        fetch(`/resolve-waiter/${callId}/`, {
            method: "POST",
            headers: { 
                /* CSRF Tokens are required by Django to prevent cross-site request forgery hacks */
                "X-CSRFToken": getCookie("csrftoken") 
            }
        })
        .then(res => res.json())
        .then(data => {
            // Once Django successfully marks it as resolved, just reload the page to refresh the list
            if(data.success) location.reload();
        });
    }

    /* Helper function to securely extract the CSRF token from the browser cookies */
    function getCookie(name){
        let cookieValue = null;
        if(document.cookie && document.cookie !== ""){
            let cookies = document.cookie.split(";");
            for(let i=0; i<cookies.length; i++){
                let cookie = cookies[i].trim();
                if(cookie.substring(0,name.length+1)===(name+"=")){
                    cookieValue = decodeURIComponent(cookie.substring(name.length+1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    /**
     * LONG POLLING / LIVE RELOAD
     * To ensure the waiters see new calls hitting the dashboard, this simple 
     * interval automatically refreshes the page every 6 seconds!
     */
    setInterval(function(){ location.reload(); }, 6000);

</script>

</body>
</html>
