<!DOCTYPE html>
<html>
<head>

<title>Running Order</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.bill-box{
background:white;
border-radius:14px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
}

.order-item{
padding:14px;
border-bottom:1px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
transition:.15s;
}

.order-item:hover{
background:#fafafa;
}

.item-info{
display:flex;
flex-direction:column;
}

.item-name{
font-weight:600;
font-size:16px;
}

.item-qty{
font-size:13px;
color:#666;
}

.status-badge{
font-size:11px;
padding:4px 8px;
border-radius:6px;
margin-top:4px;
display:inline-block;
}

.status-pending{background:#e9ecef;}
.status-preparing{background:#ffc107;}
.status-ready{background:#28a745;color:white;}
.status-served{background:#6c757d;color:white;}

.action-buttons button{
margin-left:5px;
}

.totals{
margin-top:20px;
}

.total-row{
display:flex;
justify-content:space-between;
margin-bottom:6px;
font-size:15px;
}

.total-final{
font-size:20px;
font-weight:700;
}

</style>

</head>

<body>

<div class="container mt-4">

<div class="header">

<h3>Running Order</h3>

<a href="/tables/" class="btn btn-dark">
Back to Tables
</a>

</div>

<div class="bill-box">

<div id="items"></div>

<div class="totals">

<hr>

<div class="total-row">
<span>Subtotal</span>
<span id="subtotal">₹0</span>
</div>

<div class="total-row">
<span>GST</span>
<span id="gst">₹0</span>
</div>

<div class="total-row total-final">
<span>Total</span>
<span id="total">₹0</span>
</div>

</div>

</div>

</div>

<script>

function serveItem(id){

fetch(`/serve-item/${id}/`,{
method:"POST",
headers:{
"X-CSRFToken":getCookie("csrftoken")
}
})
.then(()=>refreshRunningOrder())

}


function makeComplimentary(id){

fetch(`/complimentary-item/${id}/`,{
method:"POST",
headers:{
"X-CSRFToken":getCookie("csrftoken")
}
})
.then(()=>refreshRunningOrder())

}


function refreshRunningOrder(){

fetch("/order-data/{{order.id}}/")
.then(res=>res.json())
.then(data=>{

document.getElementById("subtotal").innerText="₹"+data.subtotal
document.getElementById("gst").innerText="₹"+data.gst
document.getElementById("total").innerText="₹"+data.total

let container=document.getElementById("items")
container.innerHTML=""

data.items.forEach(i=>{

let badgeClass="status-pending"

if(i.status==="preparing") badgeClass="status-preparing"
if(i.status==="ready") badgeClass="status-ready"
if(i.status==="served") badgeClass="status-served"

let actions=""

if(i.status==="ready"){

actions+=`
<button class="btn btn-success btn-sm"
onclick="serveItem(${i.id})">
Serve
</button>
`

}

{% if request.user.role == "manager" or request.user.role == "owner" %}

actions+=`
<button class="btn btn-warning btn-sm"
onclick="makeComplimentary(${i.id})">
Comp
</button>
`

{% endif %}

container.innerHTML+=`

<div class="order-item">

<div class="item-info">

<span class="item-name">${i.name}</span>

<span class="item-qty">
Qty: ${i.quantity}
</span>

<span class="status-badge ${badgeClass}">
${i.status}
</span>

</div>

<div class="action-buttons">
${actions}
</div>

</div>

`

})

})

}


function getCookie(name){

let cookieValue=null

if(document.cookie){

let cookies=document.cookie.split(";")

for(let i=0;i<cookies.length;i++){

let cookie=cookies[i].trim()

if(cookie.substring(0,name.length+1)===(name+"=")){
cookieValue=decodeURIComponent(cookie.substring(name.length+1))
}

}

}

return cookieValue

}


refreshRunningOrder()

setInterval(refreshRunningOrder,3000)

</script>

</body>

</html>
