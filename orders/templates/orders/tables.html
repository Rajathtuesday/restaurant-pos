<!DOCTYPE html>
<html>
<head>

<title>Tables Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

/* legend */

.legend{
display:flex;
flex-wrap:wrap;
gap:12px;
font-size:13px;
}

.legend span{
display:flex;
align-items:center;
gap:6px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

/* table cards */

.table-card{
border-radius:16px;
padding:22px;
text-align:center;
font-weight:600;
cursor:pointer;
transition:.2s;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
min-height:180px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.table-card:hover{
transform:translateY(-4px);
}

/* titles */

.table-title{
font-size:22px;
margin-bottom:6px;
}

.status{
font-size:13px;
opacity:.9;
margin-bottom:12px;
text-transform:capitalize;
}

/* states */

.free{ background:#2ecc71;color:white }
.seated{ background:#20c997;color:white }
.ordering{ background:#ffc107;color:black }
.preparing{ background:#dc3545;color:white }
.ready{ background:#fd7e14;color:white }
.served{ background:#0d6efd;color:white }
.waiting_waiter{ background:#6f42c1;color:white }
.billing{ background:#6c757d;color:white }
.paid{ background:#343a40;color:white }
.cleaning{ background:#8b5e3c;color:white }

.dot.free{background:#2ecc71}
.dot.seated{background:#20c997}
.dot.ordering{background:#ffc107}
.dot.preparing{background:#dc3545}
.dot.ready{background:#fd7e14}
.dot.served{background:#0d6efd}
.dot.waiting_waiter{background:#6f42c1}
.dot.billing{background:#6c757d}
.dot.paid{background:#343a40}
.dot.cleaning{background:#8b5e3c}

</style>

</head>

<body>

<div class="container mt-4">

<div class="header">

<h3>Tables Dashboard</h3>

<div>

<a href="/billing/" class="btn btn-success me-2">Billing</a>
<a href="/kitchen/" class="btn btn-dark me-2">Kitchen</a>
<a href="/waiter/" class="btn btn-warning">Waiter</a>

</div>

</div>


<div class="legend mb-3">

<span><div class="dot free"></div>Free</span>
<span><div class="dot seated"></div>Seated</span>
<span><div class="dot ordering"></div>Ordering</span>
<span><div class="dot preparing"></div>Preparing</span>
<span><div class="dot ready"></div>Ready</span>
<span><div class="dot served"></div>Served</span>
<span><div class="dot waiting_waiter"></div>Waiter Call</span>
<span><div class="dot billing"></div>Billing</span>
<span><div class="dot paid"></div>Paid</span>
<span><div class="dot cleaning"></div>Cleaning</span>

</div>

<div class="row" id="tables-container"></div>

</div>

<script>

function openBilling(tableId){
window.location.href="/billing/?table="+tableId
}

function openRunningOrder(orderId){
window.location.href="/order/"+orderId+"/"
}

function refreshTables(){

fetch("/tables-data/")
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("tables-container")

container.innerHTML=""

data.tables.forEach(t=>{

let button=""

if(t.status==="free"){
button=`<button class="btn btn-light btn-sm"
onclick="openBilling(${t.id})">New Order</button>`
}

if(t.status==="ordering" || t.status==="preparing"){
button=`<button class="btn btn-dark btn-sm"
onclick="openBilling(${t.id})">Continue Order</button>`
}

if(t.status==="ready" || t.status==="served"){

button=`

<button class="btn btn-dark btn-sm mb-1 w-100"
onclick="openBilling(${t.id})">
Add Item
</button>

<button class="btn btn-primary btn-sm mb-1 w-100"
onclick="openRunningOrder(${t.order_id})">
Running Bill
</button>

<a href="/bill/${t.order_id}/"
class="btn btn-success btn-sm w-100">
Generate Bill
</a>

`
}

if(t.status==="billing"){
button=`<a href="/bill/${t.order_id}/"
class="btn btn-light btn-sm w-100">Open Bill</a>`
}

if(t.status==="cleaning"){

button=`

<button class="btn btn-light btn-sm w-100"
onclick="markCleaned(${t.id})">
Table Cleaned
</button>

`
}

container.innerHTML+=`

<div class="col-lg-3 col-md-4 col-sm-6 mb-4">

<div class="table-card ${t.status}">

<div class="table-title">
${t.name}
</div>

<div class="status">
Status: ${t.status}
</div>

<div style="font-size:13px;margin-bottom:10px">

⏱ ${t.elapsed || 0} min
<br>
🍽 ${t.cooking_items || 0} cooking

</div>

${button}

</div>

</div>

`

})

})

}

refreshTables()

setInterval(refreshTables,5000)
function getCookie(name) {
let cookieValue = null;

if (document.cookie && document.cookie !== "") {

let cookies = document.cookie.split(";");

for (let i = 0; i < cookies.length; i++) {

let cookie = cookies[i].trim();

if (cookie.substring(0, name.length + 1) === (name + "=")) {
cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
break;
}

}

}

return cookieValue;
}


function markCleaned(id){

fetch(`/clean-table/${id}/`,{
method:"POST",
headers:{
"X-CSRFToken": getCookie("csrftoken")
}
})
.then(res=>res.json())
.then(data=>{

console.log("clean response:",data)

if(data.success){
setTimeout(refreshTables,200)
}else{
alert("Cleaning failed")
}

})
.catch(err=>{
console.error("Error:",err)
})

}

</script>

</body>
</html>
