<!DOCTYPE html>
<html>
<head>

<title>Kitchen Stations</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

/* CONTAINER */

.box{
max-width:700px;
margin:40px auto;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
flex-wrap:wrap;
gap:10px;
}

/* STATION ITEM */

.station{
padding:12px;
border-bottom:1px solid #eee;
}

/* MOBILE */

@media (max-width:576px){

.box{
margin:20px;
padding:20px;
}

}

</style>

</head>

<body>

<div class="box">

<!-- HEADER -->

<div class="header">
<h4 class="mb-0">Kitchen Stations</h4>
<a href="/setup/" class="btn btn-outline-secondary btn-sm">Back</a>
</div>

<p class="text-muted mb-3">
Example: Bar, Kitchen, Grill.
</p>

<!-- ADD FORM -->

<form method="POST" action="{% url 'setup_kitchen_stations' %}">
{% csrf_token %}

<div class="input-group mb-3">

<input
type="text"
name="station_name"
class="form-control"
placeholder="Enter station name"
required
>

<button class="btn btn-dark">
Add
</button>

</div>

</form>

<hr>

<!-- STATIONS LIST -->

{% for s in stations %}

<div class="station d-flex justify-content-between align-items-center flex-wrap gap-2">

    <div>
        <strong>{{s.name}}</strong>

        {% if s.is_default %}
            <span class="badge bg-success ms-2">Default</span>
        {% endif %}
    </div>

    <div class="d-flex gap-2">

        {% if not s.is_default %}
        <form method="POST" action="{% url 'set-default-station' s.id %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-sm btn-outline-primary">
                Make Default
            </button>
        </form>
        {% endif %}

    </div>

</div>

{% empty %}

<div class="text-center py-3">

<p class="text-muted mb-2">
No stations created.
</p>

<p class="small text-muted">
Orders will go to <strong>General Kitchen</strong> by default.
</p>

</div>

{% endfor %}

</div>

</body>
</html>
