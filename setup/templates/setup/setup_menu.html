<!DOCTYPE html>
<html>
<head>

<title>Menu Setup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

.container-box{
max-width:700px;
margin:80px auto;
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

.category{
padding:8px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="container-box">

<h4>Menu Categories</h4>

<p class="text-muted">
Create categories like Drinks, Starters, Main Course.
</p>

<form method="POST">

{% csrf_token %}

<div class="input-group mb-3">

<input
type="text"
name="category_name"
class="form-control"
placeholder="Category name"
required
>

<button class="btn btn-dark">
Add
</button>

</div>

</form>

<hr>

<h6>Existing Categories</h6>

{% for c in categories %}

<div class="category">

{{c.name}}

</div>

{% empty %}

<p class="text-muted">No categories created yet.</p>

{% endfor %}

<div class="text-center mt-4">

<a href="/setup/" class="btn btn-outline-secondary">
Back
</a>

</div>

</div>

</body>
</html>
