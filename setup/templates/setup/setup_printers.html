<!DOCTYPE html>
<html>
<head>

<title>Kitchen Stations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

.box{
max-width:700px;
margin:80px auto;
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

.station{
padding:8px;
border-bottom:1px solid #eee;
}

</style>

</head>

<body>

<div class="box">

<h4>Kitchen Stations</h4>

<p class="text-muted">
Example: Bar, Kitchen, Grill.
</p>

<form method="POST">

{% csrf_token %}

<div class="input-group mb-3">

<input
type="text"
name="station_name"
class="form-control"
placeholder="Station name"
required
>

<button class="btn btn-dark">
Add
</button>

</div>

</form>

<hr>

{% for s in stations %}

<div class="station">

{{s.name}}

</div>

{% empty %}

<p class="text-muted">
No stations created yet.
</p>

{% endfor %}

<div class="text-center mt-4">

<a href="/setup/" class="btn btn-outline-secondary">
Back
</a>

</div>

</div>

</body>
</html>
