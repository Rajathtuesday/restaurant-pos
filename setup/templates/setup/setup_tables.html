<!DOCTYPE html>
<html>
<head>

<title>Restaurant Tables Setup</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

/* container */

.container-box{
max-width:650px;
margin:80px auto;
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* header */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.header h4{
font-weight:700;
margin:0;
}

/* tables grid */

.tables-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:10px;
}

.table-pill{
background:#f1f3f5;
border-radius:8px;
padding:6px;
text-align:center;
font-size:13px;
}

.table-count{
font-weight:600;
color:#666;
font-size:13px;
margin-top:6px;
}

</style>

</head>

<body>

<div class="container-box">

<div class="header">

<h4>Restaurant Tables</h4>

<a href="/setup/" class="btn btn-outline-secondary btn-sm">
Back
</a>

</div>

<p class="text-muted">
Add dining tables for your restaurant.  
You can add more tables later anytime.
</p>


<!-- FORM -->

<form method="POST">

{% csrf_token %}

<div class="row g-2">

<div class="col-md-8">

<label class="form-label">
Add Tables
</label>

<input
type="number"
name="table_count"
class="form-control"
min="1"
max="200"
placeholder="Example: 10"
required
>

</div>

<div class="col-md-4 d-grid">

<label class="form-label invisible">.</label>

<button class="btn btn-dark">
Add Tables
</button>

</div>

</div>

</form>


<!-- CURRENT TABLES -->

<hr>

<h6>Existing Tables</h6>

<div class="table-count">
{{tables|length}} tables configured
</div>

<div class="tables-grid">

{% for t in tables %}

<div class="table-pill">
{{t.name}}
</div>

{% empty %}

<p class="text-muted">
No tables created yet.
</p>

{% endfor %}

</div>

<hr>

<div class="text-center">

<a href="/setup/menu/" class="btn btn-success">
Next: Setup Menu →
</a>

</div>

</div>

</body>
</html>
