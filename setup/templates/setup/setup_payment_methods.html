<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Methods | Setup</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0f1115; --panel: #1a1d24; --text: #f9fafb; --muted: #9ca3af; --border: #2d3139; --gold: #c5a059; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
        .site-header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .brand { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; }
        .nav-link { color: var(--muted); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 600; }
        .nav-link:hover { color: var(--gold); }

        .page-body { max-width: 680px; margin: 4rem auto; padding: 0 2rem; }
        .page-eyebrow { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 4px; color: var(--gold); margin-bottom: 0.5rem; }
        .page-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
        .page-sub { color: var(--muted); font-size: 0.85rem; line-height: 1.6; margin-bottom: 2.5rem; }
        .divider { width: 40px; height: 1px; background: var(--gold); margin: 1.5rem 0; }

        .method-card { background: var(--panel); border: 1px solid var(--border); padding: 1.5rem 2rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; transition: border-color 0.2s; }
        .method-card:has(input:checked) { border-color: var(--gold); }
        .method-icon { font-size: 1.4rem; color: var(--gold); width: 36px; }
        .method-info { flex: 1; }
        .method-name { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; }
        .method-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
        .method-label-input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--muted); font-size: 0.75rem; width: 130px; padding: 4px 0; outline: none; }
        .method-label-input:focus { border-bottom-color: var(--gold); color: var(--text); }

        /* Toggle switch */
        .toggle { position: relative; width: 44px; height: 24px; }
        .toggle input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer; transition: 0.3s; }
        .slider::before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; bottom: 3px; background: var(--muted); border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--gold); }
        input:checked + .slider::before { transform: translateX(20px); background: #fff; }

        .btn-save { width: 100%; padding: 1rem; background: var(--gold); border: none; color: #fff; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; cursor: pointer; margin-top: 2rem; transition: background 0.2s; }
        .btn-save:hover { background: #b59250; }
    </style>
</head>
<body>
<header class="site-header">
    <span class="brand"><i class="bi bi-diamond-half" style="color:var(--gold)"></i> &nbsp;Payment Methods</span>
    <a href="/setup/" class="nav-link">← Back to Setup</a>
</header>

<div class="page-body">
    <p class="page-eyebrow">Configuration</p>
    <h1 class="page-title">Payment Methods</h1>
    <div class="divider"></div>
    <p class="page-sub">Enable the payment types your outlet accepts. You can customise label names (e.g. show "GPay" instead of "UPI").</p>

    <form method="post">
        {% csrf_token %}

        <div class="method-card">
            <div class="method-icon"><i class="bi bi-cash-coin"></i></div>
            <div class="method-info">
                <div class="method-name">Cash</div>
                <div class="method-desc">Physical currency payment</div>
                <input type="text" name="cash_label" class="method-label-input mt-2" value="{{ config.cash_label }}" placeholder="Label (e.g. Cash)">
            </div>
            <label class="toggle">
                <input type="checkbox" name="methods" value="cash" {% if config.cash_enabled %}checked{% endif %}>
                <span class="slider"></span>
            </label>
        </div>

        <div class="method-card">
            <div class="method-icon"><i class="bi bi-qr-code-scan"></i></div>
            <div class="method-info">
                <div class="method-name">UPI</div>
                <div class="method-desc">Google Pay, PhonePe, Paytm</div>
                <input type="text" name="upi_label" class="method-label-input mt-2" value="{{ config.upi_label }}" placeholder="Label (e.g. GPay / UPI)">
            </div>
            <label class="toggle">
                <input type="checkbox" name="methods" value="upi" {% if config.upi_enabled %}checked{% endif %}>
                <span class="slider"></span>
            </label>
        </div>

        <div class="method-card">
            <div class="method-icon"><i class="bi bi-credit-card"></i></div>
            <div class="method-info">
                <div class="method-name">Card</div>
                <div class="method-desc">Debit / Credit card via POS machine</div>
                <input type="text" name="card_label" class="method-label-input mt-2" value="{{ config.card_label }}" placeholder="Label (e.g. Card)">
            </div>
            <label class="toggle">
                <input type="checkbox" name="methods" value="card" {% if config.card_enabled %}checked{% endif %}>
                <span class="slider"></span>
            </label>
        </div>

        <button type="submit" class="btn-save">Save Configuration</button>
    </form>
</div>
</body>
</html>
