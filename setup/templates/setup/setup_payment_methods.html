<!DOCTYPE html>
<html>
<head>

<title>Payment Methods</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f6fb;
font-family:system-ui;
}

.box{
max-width:500px;
margin:100px auto;
background:white;
padding:35px;
border-radius:14px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
}

</style>

</head>

<body>

<div class="box">

<h4>Select Payment Methods</h4>

<p class="text-muted">
Choose the payment methods accepted in your restaurant.
</p>

<form method="POST">

{% csrf_token %}

<div class="form-check">

<input class="form-check-input" type="checkbox" name="methods" value="cash">
<label class="form-check-label">
Cash
</label>

</div>

<div class="form-check">

<input class="form-check-input" type="checkbox" name="methods" value="upi">
<label class="form-check-label">
UPI
</label>

</div>

<div class="form-check">

<input class="form-check-input" type="checkbox" name="methods" value="card">
<label class="form-check-label">
Card
</label>

</div>

<br>

<button class="btn btn-dark w-100">
Save Payment Methods
</button>

</form>

<div class="text-center mt-3">

<a href="/setup/" class="btn btn-outline-secondary btn-sm">
Back
</a>

</div>

</div>

</body>
</html>
