<!DOCTYPE html>
<html>
<head>

<title>{{ request.tenant.name }} POS Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#1d3557,#457b9d);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:system-ui;
}

.login-card{
width:380px;
background:white;
border-radius:14px;
padding:35px;
box-shadow:0 12px 40px rgba(0,0,0,0.2);
}

.logo{
font-size:26px;
font-weight:700;
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#777;
font-size:14px;
margin-bottom:25px;
}

.form-control{
border-radius:8px;
padding:10px;
}

.btn-login{
width:100%;
padding:10px;
font-weight:600;
border-radius:8px;
}

.error-box{
background:#ffe5e5;
color:#b00020;
padding:10px;
border-radius:8px;
margin-bottom:15px;
font-size:13px;
}

.footer{
text-align:center;
font-size:12px;
color:#888;
margin-top:18px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">
{{ request.tenant.name }} POS
</div>

<div class="subtitle">
Restaurant Management System
</div>

{% for message in messages %}

<div class="error-box">
{{ message }}
</div>

{% endfor %}

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<input
type="text"
name="username"
class="form-control"
placeholder="Username"
required
>

</div>

<div class="mb-3">

<input
type="password"
name="password"
class="form-control"
placeholder="Password"
required
>

</div>

<button class="btn btn-primary btn-login">
Login
</button>

</form>

<div class="footer">
Powered by YourPOS
</div>

</div>

</body>
</html>
