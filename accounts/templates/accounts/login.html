<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Authentication</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    
    <!-- Premium Fonts: Playfair Display (Serif) & Inter (Sans-serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            /* Fine Dining Monochrome Palette */
            --bg-color: #fafafa;
            --panel-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #737373;
            --border-color: #eaeaea;
            --accent-gold: #c5a059;
            --accent-hover: #b59250;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        body.dark {
            --bg-color: #0a0a0a;
            --panel-bg: #111111;
            --text-main: #f5f5f5;
            --text-muted: #888888;
            --border-color: #262626;
            --accent-gold: #d4af37;
            --accent-hover: #e5c45e;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            transition: var(--transition-smooth);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        /* Authentication Card */
        .auth-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 450px;
            padding: 4rem 3rem;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }
        body.dark .auth-card { box-shadow: none; }

        /* Typography */
        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            text-align: center;
        }
        
        .brand-subtitle {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 3rem;
        }

        /* Form Controls */
        .form-control-luxury {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 0;
            padding: 1rem 1.2rem;
            font-size: 0.95rem;
            transition: var(--transition-smooth);
            width: 100%;
        }

        .form-control-luxury:focus {
            box-shadow: none;
            border-color: var(--accent-gold);
            outline: none;
        }

        .form-control-luxury::placeholder {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        .input-group-text {
            background: transparent;
            border: 1px solid var(--border-color);
            border-right: none;
            color: var(--text-muted);
            border-radius: 0;
            padding: 1rem;
        }

        /* Button */
        .btn-luxury-primary {
            background: var(--accent-gold);
            border: 1px solid var(--accent-gold);
            color: #fff;
            border-radius: 0;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 2px;
            font-weight: 500;
            padding: 1rem;
            width: 100%;
            transition: var(--transition-smooth);
            font-family: inherit;
        }

        .btn-luxury-primary:hover {
            background: var(--accent-hover);
            border-color: var(--accent-hover);
            color: #fff;
        }

        .error-message {
            background: transparent;
            border: 1px dashed #ef4444;
            color: #ef4444;
            padding: 0.8rem;
            border-radius: 0;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Quick Theme Toggle */
        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--transition-smooth);
        }
        .theme-toggle:hover { color: var(--accent-gold); }

        /* MOBILE ADJUSTMENTS */
        @media (max-width: 576px) {
            .auth-card { padding: 3rem 2rem; border: none; background: transparent; box-shadow: none; }
            body { align-items: flex-start; padding-top: 15vh; }
            .brand-title { font-size: 2rem; }
        }
        
    </style>
</head>
<body>

    <div class="auth-card">
        <button class="theme-toggle" onclick="toggleDark()" title="Theme">
            <i class="bi bi-moon" id="themeIcon"></i>
        </button>

        <div class="text-center mb-4">
            <h1 class="brand-title">POS Portal</h1>
            <div class="brand-subtitle">Staff Authentication</div>
        </div>

        {% if error %}
            <div class="error-message">
                <i class="bi bi-exclamation-triangle me-1"></i> {{ error }}
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control-luxury" placeholder="Identifier" required autocomplete="username">
                </div>
            </div>
            
            <div class="mb-5">
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-key"></i></span>
                    <input type="password" name="password" class="form-control-luxury" placeholder="Passcode" required autocomplete="current-password">
                </div>
            </div>

            <button type="submit" class="btn-luxury-primary shadow-sm">
                Authenticate
            </button>
        </form>
    </div>

<script>
    let isDark = localStorage.getItem("dark") === "true";

    function updateIcons() {
        let icon = document.getElementById("themeIcon");
        if(isDark) {
            document.body.classList.add("dark");
            icon.classList.remove("bi-moon");
            icon.classList.add("bi-sun");
        } else {
            document.body.classList.remove("dark");
            icon.classList.remove("bi-sun");
            icon.classList.add("bi-moon");
        }
    }

    updateIcons();

    function toggleDark() {
        isDark = !isDark;
        localStorage.setItem("dark", isDark);
        updateIcons();
    }
</script>

</body>
</html>
